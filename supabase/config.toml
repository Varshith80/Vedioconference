{
  "$schema": "https://raw.githubusercontent.com/supabase/cli/main/specs/supabase_config.schema.json",
  "projectId": "vedioconference",
  "name": "Vedioconference Course Platform",
  "version": "1.0.0",
  "description": "Production-ready tutoring platform built on Supabase + Next.js + n8n.",
  "api": {
    "port": 54321,
    "schemas": ["public", "storage", "graphql_public"],
    "extra_search_path": ["public", "extensions"],
    "max_rows": 1000
  },
  "db": {
    "port": 54322,
    "shadow_port": 54320,
    "major_version": 15
  },
  "studio": {
    "port": 54323
  },
  "storage": {
    "file_size_limit": "50MiB"
  },
  "auth": {
    "site_url": "http://localhost:3000",
    "additional_redirect_urls": ["http://localhost:3000/auth/callback"],
    "jwt_expiry": 3600,
    "enable_signup": true,
    "enable_anonymous_sign_ins": false,
    "enable_manual_linking": false,
    "minimum_password_length": 10,
    "password_requirements": "lower_upper_letters_digits",
    "email": {
      "enable_confirmations": true,
      "double_confirm_changes": true
    }
  },
  "functions": {
    "verify-jwt": {
      "verify_jwt": true
    }
  }
}
