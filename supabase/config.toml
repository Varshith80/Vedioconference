# Supabase local development configuration.
# Reference: https://supabase.com/docs/guides/local-development/cli/config
#
# This file is read by the Supabase CLI for `supabase start`,
# `supabase stop`, `supabase db reset`, and the local Studio /
# Auth / Storage emulators. It is NOT used for the linked
# remote project (ffillswcwzefhlojtnkq) — the remote link is
# held by the CLI outside of this file.
#
# Only keys accepted by the current Supabase CLI schema are
# used. `name`, `version`, `description` are intentionally
# omitted (the schema does not accept them).

project_id = "vedioconference"

[api]
enabled            = true
port               = 54321
schemas            = ["public", "storage", "graphql_public"]
extra_search_path  = ["public", "extensions"]
max_rows           = 1000

[db]
port          = 54322
shadow_port   = 54320
major_version = 15

# Local seed file. The Supabase CLI v2.x looks for `supabase/seed.sql`
# at the top of the `supabase/` directory by default. This project
# keeps the seed in `supabase/seed/000_seed.sql` (alongside the
# `consolidated_demo_seed.sql` for Sprint 3.5+) so the directory
# structure is preserved. We point the CLI at the base seed here.
# The `consolidated_demo_seed.sql` is NOT loaded by `supabase start`
# by design; it is loaded by `supabase db reset` when the user
# wants the post-Sprint-3.5 demo data. See scripts/db-push.sh for
# the migration push path; the seed is dev / staging only and is
# never applied to production.
[db.seed]
sql_paths = ["./seed/000_seed.sql"]

[studio]
enabled = true
port    = 54323

[storage]
enabled         = true
file_size_limit = "50MiB"

[auth]
enabled                    = true
site_url                   = "http://localhost:3000"
additional_redirect_urls   = ["http://localhost:3000/auth/callback"]
jwt_expiry                 = 3600
enable_signup              = true
enable_anonymous_sign_ins  = false
enable_manual_linking      = false
minimum_password_length    = 10
password_requirements      = "lower_upper_letters_digits"

  [auth.email]
  enable_confirmations   = true
  double_confirm_changes = true

[functions.verify-jwt]
verify_jwt = true
